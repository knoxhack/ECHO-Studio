name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-beta*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional release tag to validate (defaults to package.json version).'
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release-metadata.outputs.tag }}
      channel: ${{ steps.release-metadata.outputs.channel }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - id: release-metadata
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ -z "$TAG" ] || [ "$TAG" = "null" ] || [ "$TAG" = "" ] || [ "$TAG" = "main" ]; then
            TAG="v${PACKAGE_VERSION}"
          fi

          if [ -n "${{ github.event_name }}" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            OVERRIDE='${{ github.event.inputs.tag }}'
            if [ -n "$OVERRIDE" ]; then
              TAG="$OVERRIDE"
            fi
          fi

          if ! [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-beta\.[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag format: $TAG"
            exit 1
          fi

          PKG_VERSION="v${PACKAGE_VERSION}"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag/version mismatch: tag=$TAG package=$PKG_VERSION"
            exit 1
          fi

          CHANNEL="stable"
          if [[ "$TAG" == *-beta.* ]]; then
            CHANNEL="beta"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

  release:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate release policy
        run: >
          node scripts/validate-release-feed.mjs
          --track public
          --stream echo-addons-studio
          --builder electron-builder.yml
          --package package.json
          --source src/main/index.ts
          --workflow .github/workflows/release.yml
          --public-only

      - run: npm ci

      - name: Build and publish release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_UPDATE_CHANNEL: ${{ needs.validate.outputs.channel }}
        run: |
          npm run dist:publish

      - name: Validate release assets
        shell: pwsh
        run: |
          if (-not (Test-Path 'release')) {
            throw 'release output directory missing'
          }

          $releaseFiles = Get-ChildItem -Path release -File | Where-Object {
            $_.Name -ne 'SHA256SUMS.txt' -and $_.Name -ne 'builder-debug.yml'
          }

          $manifests = $releaseFiles | Where-Object { $_.Name -like 'latest*.yml' }
          if (-not $manifests) {
            throw 'Expected updater manifest latest*.yml missing from release artifacts'
          }

          $installers = $releaseFiles | Where-Object { $_.Extension -in '.exe', '.zip', '.dmg', '.AppImage', '.deb', '.rpm' }
          if (-not $installers) {
            throw 'No installer artifacts found under release directory'
          }

          $sumFile = Join-Path release 'SHA256SUMS.txt'
          Remove-Item -Force $sumFile -ErrorAction SilentlyContinue
          $releaseFiles | Sort-Object Name | ForEach-Object {
            $hash = Get-FileHash -Path $_.FullName -Algorithm SHA256
            [System.IO.File]::AppendAllText($sumFile, "$($hash.Hash.ToLower()) *$($_.Name)`n", [System.Text.Encoding]::UTF8)
          }

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-checksums: release/SHA256SUMS.txt

      - name: Upload checksum manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.validate.outputs.tag }}" release/SHA256SUMS.txt --clobber
